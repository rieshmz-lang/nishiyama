<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>仲間VSウイルスゲーム</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: skyblue;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* プレイヤー */
#player {
  position: absolute;
  width: 80px;
  z-index: 5;
}

/* ブロック */
#block {
  position: absolute;
  width: 80px;
  left: 400px;
  top: 350px;
  cursor: pointer;
  z-index: 10;
}

/* ウイルス */
#virus {
  position: absolute;
  width: 80px;
  z-index: 5;
}

/* 仲間 */
.spawn {
  position: absolute;
  width: 60px;
  z-index: 20;
}
</style>
</head>

<body>

<div id="game">
  <img id="player" src="panda.png">
  <img id="block" src="block.png">
  <img id="virus" src="virus.png">
</div>

<script>

const player = document.getElementById("player");
const block = document.getElementById("block");
const virus = document.getElementById("virus");

// =====================
// プレイヤー
// =====================
let px = 100;
let py = 400;

player.style.left = px + "px";
player.style.top = py + "px";

// =====================
// 仲間・HP
// =====================
const allies = [];
let virusHP = 10;

// =====================
// 操作
// =====================
document.addEventListener("keydown", (e) => {
  if (e.key === "a") px -= 10;
  if (e.key === "d") px += 10;
  player.style.left = px + "px";

  if (e.code === "Space") jump();
});

// =====================
// ジャンプ
// =====================
let isJumping = false;

function jump() {
  if (isJumping) return;
  isJumping = true;

  let up = 0;

  let upTimer = setInterval(() => {
    if (up < 120) {
      py -= 5;
      player.style.top = py + "px";
      up += 5;
    } else {
      clearInterval(upTimer);

      let downTimer = setInterval(() => {
        if (up > 0) {
          py += 5;
          player.style.top = py + "px";
          up -= 5;
        } else {
          clearInterval(downTimer);
          isJumping = false;
        }
      }, 10);
    }
  }, 10);
}

// =====================
// ウイルス（追跡）
// =====================
let vx = 600;
let vy = 200;

setInterval(() => {

  if (vx < px) vx += 0.4;
  if (vx > px) vx -= 0.4;

  if (vy < py) vy += 0.3;
  if (vy > py) vy -= 0.3;

  virus.style.left = vx + "px";
  virus.style.top = vy + "px";

  if (Math.abs(vx - px) < 50 && Math.abs(vy - py) < 50) {
    alert("💀 やられた！");
    vx = 600;
    vy = 200;
  }

}, 20);

// =====================
// ブロッククリック → 仲間
// =====================
block.addEventListener("click", () => {

  const img = document.createElement("img");

  const animals = [
    "gibbon.png",
    "peacock.png",
    "chabo.png",
    "kinkei.png"
  ];

  img.src = animals[Math.floor(Math.random() * animals.length)];

  img.classList.add("spawn");

  img.style.left = px + "px";
  img.style.top = py + "px";

  document.body.appendChild(img);

  allies.push({
    el: img
  });
});

// =====================
// 仲間AI（ウイルスを攻撃）
// =====================
setInterval(() => {

  allies.forEach((a, i) => {

    let ax = parseFloat(a.el.style.left);
    let ay = parseFloat(a.el.style.top);

    // ウイルスへ向かう
    ax += (vx - ax) * 0.05;
    ay += (vy - ay) * 0.05;

    a.el.style.left = ax + "px";
    a.el.style.top = ay + "px";

    // 当たり判定（攻撃）
    if (Math.abs(ax - vx) < 40 && Math.abs(ay - vy) < 40) {

      virusHP -= 1;

      // 仲間消える（攻撃後）
      a.el.remove();
      allies.splice(i, 1);

      if (virusHP <= 0) {
        alert("🎉 ウイルス撃破！");
        vx = 600;
        vy = 200;
        virusHP = 10;
      }
    }

  });

}, 50);

</script>

</body>
</html>
